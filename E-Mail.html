<!DOCTYPE html>
<html lang="en">

<head>
  <title>MDTMD E-Mail</title>
  <style>
    body {
      background-color: #008080;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1, h2 {
      margin-top: 32px;
    }

    a {
      color: #98FB98;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      color: #00FF00;
      text-decoration: underline;
    }

    .box {
      background-color: #C0C0C0;
      color: black;
      width: 70%;
      margin: 32px auto;
      padding: 32px;
      border: 2px inset white;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 90%;
      padding: 12px;
      margin-bottom: 16px;
      border: 4px solid #008080;
      background-color: white;
      font-family: Arial, sans-serif;
      font-size: 16px;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      background-color: #D3D3D3;
      border: 2px solid black;
      cursor: pointer;
    }

    button:active {
      border-style: inset;
    }

    .footer {
      margin-top: 64px;
      font-size: 12px;
    }

    .hidden {
      display: none;
    }

    label {
      display: block;
      text-align: left;
      margin-left: 5%;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>MDTMD E-Mail</h1>
  <p><i>Securest & Safest E-Mail!</i></p>

  <div class="box">
    <h2>Login</h2>
    <form onsubmit="return redirectToInbox()">
      <input type="email" id="login-email" name="email" placeholder="@MDTMD Email"><br>
      <input type="password" id="login-password" name="password" placeholder="Password"><br>
      <button type="submit">Login to Inbox</button>
    </form>
  </div>

  <div class="box">
    <h2>Request Your Email Address</h2>
    <form onsubmit="return sendEmailRequest()">
      <input type="text" id="username" name="username" placeholder="Choose Username"><br>
      <input type="email" id="new-email" name="new-email" placeholder="YourEmailHere@MDTMD.com"><br>
      <input type="password" id="new-password" name="new-password" placeholder="Create Password" onblur="showConfirm()"><br>

      <div id="confirm-section" class="hidden">
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm Password"><br>
        <input type="text" name="captcha" placeholder="Type the word: MDTMD"><br>
      </div>

      <button type="submit">Send E-Mail Request To Webmaster</button>
    </form>
  </div>

  <div class="footer">
    <p><a href="Index.html">Return to MDTMD</a></p>
    <p>© MorganDev, MDTMD. | All rights reserved.</p>
  </div>

  <script>
    function showConfirm() {
      const password = document.getElementById('new-password').value;
      if (password.length > 0) {
        document.getElementById('confirm-section').classList.remove('hidden');
      }
    }

    function redirectToInbox() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !email.endsWith("@mdtmd.com") || email.slice(-10) !== "@mdtmd.com") {
        alert("Please enter a valid @MDTMD.com email address to login.");
        return false;
      }

      if (!password) {
        alert("Please enter your password.");
        return false;
      }

      // Redirect to E-Mail_Login.html
      window.location.href = "E-Mail_Login.html";
      return false; // prevent actual form submission
    }

    function sendEmailRequest() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('new-email').value.trim();
      const pw1 = document.getElementById('new-password').value;
      const pw2 = document.getElementById('confirm-password').value;
      const captcha = document.querySelector('input[name="captcha"]').value.trim();

      if (!username) {
        alert("Please choose a username.");
        return false;
      }

      if (!email || !email.endsWith("@mdtmd.com") || email.slice(-10) !== "@mdtmd.com") {
        alert("Email must end with @MDTMD.com.");
        return false;
      }

      if (!pw1 || !pw2) {
        alert("Please enter and confirm your password.");
        return false;
      }

      if (pw1 !== pw2) {
        alert("Oops! Passwords don't match.");
        return false;
      }

      if (captcha.toUpperCase() !== "MDTMD") {
        alert("I Think You're a Robot. Type MDTMD.");
        return false;
      }

      const subject = encodeURIComponent("New MDTMD Email Request");
      const body = encodeURIComponent(
        `Username: ${username}\nRequested Email: ${email}\nPassword: ${pw1}`
      );
      const recipient = "webmaster@mdtmd.com"; // ← CHANGE THIS TO YOUR EMAIL

      window.location.href = `mailto:${recipient}?subject=${subject}&body=${body}`;
      return false; // prevent form submission
    }
  </script>
</body>

</html>
